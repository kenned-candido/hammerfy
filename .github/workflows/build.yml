name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (ex: v0.1.0-beta)'
        required: true
        default: 'v0.1.0-beta'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Set version env
        run: echo "HAMMERFY_VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_ENV

      - name: Build EXE
        run: pyinstaller hammerfy.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Update version in ISS
        run: |
          (Get-Content installer\hammerfy.iss) -replace '#define MyAppVersion ".*"', '#define MyAppVersion "${{ github.event.inputs.version }}"' | Set-Content installer\hammerfy.iss

      - name: Compile installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\hammerfy.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Hammerfy ${{ github.event.inputs.version }}
          draft: true
          files: |
            installer/output/Hammerfy-Setup-${{ github.event.inputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}